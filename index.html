<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', 'Montserrat', sans-serif; background: #667eea; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { font-family: 'Outfit', sans-serif; color: #333; margin-bottom: 20px; text-align: center; font-size: 36px; font-weight: 900; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 15px; }
        label { font-family: 'Montserrat', sans-serif; display: block; color: #333; font-weight: 800; margin-bottom: 5px; font-size: 13px; letter-spacing: 0.3px; }
        input { font-family: 'Outfit', sans-serif; width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        button { font-family: 'Outfit', sans-serif; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 15px; letter-spacing: 0.3px; }
        button:hover { background: #764ba2; }
        #resultado { display: none; margin-top: 30px; text-align: center; }
        #resultado.show { display: block; }
        #qrcode { display: inline-block; padding: 20px; background: white; border: 2px solid #ddd; border-radius: 10px; }
        .botones { display: flex; gap: 10px; margin-top: 20px; }
        .botones button { flex: 1; }
        #feedbackPage { display: none; min-height: 100vh; background: #667eea; display: flex; align-items: center; justify-content: center; padding: 20px; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        #feedbackPage.show { display: flex; }
        .feedback-card { background: white; padding: 40px; border-radius: 10px; text-align: center; max-width: 400px; }
        .feedback-card h2 { font-family: 'Outfit', sans-serif; color: #333; margin-bottom: 20px; font-size: 32px; font-weight: 900; letter-spacing: -0.5px; }
        .feedback-card p { font-family: 'Outfit', sans-serif; color: #666; margin-bottom: 20px; font-size: 16px; font-weight: 700; }
        .feedback-btn { font-family: 'Outfit', sans-serif; display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 5px; font-weight: 800; cursor: pointer; color: white; text-decoration: none; font-size: 15px; letter-spacing: 0.3px; }
        .whatsapp { background: #25D366; }
        .whatsapp:hover { background: #20BA5A; }
        .google { background: #4CAF50; }
        .google:hover { background: #45a049; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; color: #1565c0; }
    </style>
</head>
<body>
    <!-- GENERADOR -->
    <div id="generador">
        <div class="container">
            <h1>🎯 Generador QR Feedback</h1>
            <div class="info">✅ WhatsApp y Google ya están configurados</div>
            
            <form onsubmit="generarQR(event)">
                <div class="form-group">
                    <label>Nombre del Negocio:</label>
                    <input type="text" id="negocio" placeholder="Mi Salón" required>
                </div>

                <div class="form-group">
                    <label>Texto del QR:</label>
                    <input type="text" id="texto" value="¿Tienes feedback? ¡Déjalo aquí!" required>
                </div>

                <button type="submit">✨ Generar QR</button>
            </form>

            <div id="resultado">
                <h2>Tu QR está listo:</h2>
                <p id="textoMostrado"></p>
                <p style="color: #999; font-size: 12px;">Quejas privadas o reseñas públicas</p>
                <div id="qrcode"></div>
                
                <div class="botones">
                    <button onclick="probarQR()" style="background: #FF9800;">🧪 Probar</button>
                    <button onclick="descargarQR()">⬇️ Descargar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FEEDBACK -->
    <div id="feedbackPage">
        <div class="feedback-card">
            <p style="margin-bottom: 15px; font-size: 16px; color: #333; font-weight: bold; line-height: 1.6;">
                Si no te gustó lo que hizo el trabajador, escribe una queja en WhatsApp
            </p>
            
            <button class="feedback-btn whatsapp" onclick="abrirWhatsapp()">💬 WhatsApp</button>
            
            <p style="margin-top: 20px; margin-bottom: 15px; font-size: 16px; color: #333; font-weight: bold; line-height: 1.6;">
                Si te gustó, deja un review en Google
            </p>
            
            <button class="feedback-btn google" onclick="abrirGoogle()">⭐ Google</button>
            
            <h2 style="margin-top: 30px;">💬 ¡Tu opinión nos importa!</h2>
            <p id="nombreNegocio"></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.4.4/qrcode.min.js"></script>
    <script>
        let datosGlobales = {
            negocio: '',
            whatsappDuena: '+14075011720',
            googleLink: 'https://share.google/CtTNpxN8IrOQA8BoC',
            url: '',
            qrDiv: null
        };

        // Verificar si hay parámetros en URL
        window.onload = function() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            if (params.has('negocio')) {
                mostrarFeedback(params);
            }
        };

        function generarQR(e) {
            e.preventDefault();

            const negocio = document.getElementById('negocio').value;
            const texto = document.getElementById('texto').value;

            datosGlobales.negocio = negocio;

            // Crear URL
            const baseUrl = window.location.href.split('#')[0];
            const url = baseUrl + '#negocio=' + encodeURIComponent(negocio);
            datosGlobales.url = url;

            console.log('URL generada:', url);
            console.log('WhatsApp configurado:', datosGlobales.whatsappDuena);
            console.log('Google configurado:', datosGlobales.googleLink);

            // Mostrar texto
            document.getElementById('textoMostrado').textContent = texto;

            // Limpiar QR anterior
            document.getElementById('qrcode').innerHTML = '';

            // Generar QR
            new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 250,
                height: 250,
                correctLevel: QRCode.CorrectLevel.H
            });

            datosGlobales.qrDiv = document.getElementById('qrcode');

            // Mostrar resultado
            document.getElementById('resultado').classList.add('show');
        }

        function probarQR() {
            if (!datosGlobales.negocio) {
                alert('Genera el QR primero');
                return;
            }
            window.location.hash = 'negocio=' + encodeURIComponent(datosGlobales.negocio);
        }

        function mostrarFeedback(params) {
            document.getElementById('generador').style.display = 'none';
            document.getElementById('feedbackPage').classList.add('show');

            const negocio = decodeURIComponent(params.get('negocio'));
            document.getElementById('nombreNegocio').textContent = negocio;

            datosGlobales.negocio = negocio;
        }

        function abrirWhatsapp() {
            // Número sin caracteres especiales: 14075011720
            const numero = '14075011720';
            
            // Mensaje personalizado
            const mensaje = 'Hola, tengo feedback para ' + encodeURIComponent(datosGlobales.negocio);
            
            // URL correcta de WhatsApp
            const urlWhatsapp = 'https://wa.me/' + numero + '?text=' + mensaje;
            
            console.log('Abriendo WhatsApp:', urlWhatsapp);
            window.open(urlWhatsapp, '_blank');
        }

        function abrirGoogle() {
            console.log('Abriendo Google:', datosGlobales.googleLink);
            window.open(datosGlobales.googleLink, '_blank');
        }

        function descargarQR() {
            const canvas = datosGlobales.qrDiv.querySelector('canvas');
            if (!canvas) {
                alert('Genera el QR primero');
                return;
            }

            const finalCanvas = document.createElement('canvas');
            const ctx = finalCanvas.getContext('2d');

            finalCanvas.width = 400;
            finalCanvas.height = 480;

            // Fondo blanco
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            // Texto
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#667eea';
            ctx.textAlign = 'center';
            ctx.fillText(document.getElementById('texto').value, finalCanvas.width / 2, 40);

            // Subtexto
            ctx.font = '13px Arial';
            ctx.fillStyle = '#999';
            ctx.fillText('Quejas privadas o reseñas públicas', finalCanvas.width / 2, 65);

            // QR
            ctx.drawImage(canvas, (finalCanvas.width - 250) / 2, 90, 250, 250);

            // Descargar
            const link = document.createElement('a');
            link.href = finalCanvas.toDataURL('image/png');
            link.download = 'qr-feedback-' + datosGlobales.negocio.replace(/\s/g, '-').toLowerCase() + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
